<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Live Route Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Fira+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #4285F4;
            --primary-dark: #2b6fd4;
            --danger: #EA4335;
            --bg-dark: #0f1117;
            --bg-card: #1a1d27;
            --border: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: #9aa0b4;
            --radius: 12px;
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Fira Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-dark);
            color: var(--text-primary);
        }

        .auth-card {
            width: 100%;
            max-width: 420px;
            padding: 48px 40px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
            animation: cardIn 0.4s ease-out;
        }

        @keyframes cardIn {
            0% {
                opacity: 0;
                transform: translateY(10px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-card .logo {
            text-align: center;
            margin-bottom: 12px;
        }

        .auth-card .logo .icon {
            width: 56px;
            height: 56px;
            background: rgba(66, 133, 244, 0.1);
            border: 1px solid var(--primary);
            border-radius: var(--radius);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            margin-bottom: 16px;
        }

        .auth-card h1 {
            text-align: center;
            color: var(--text-primary);
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .auth-card .subtitle {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 32px;
        }

        .input-group {
            position: relative;
            margin-bottom: 24px;
        }

        .input-group input {
            width: 100%;
            padding: 16px 16px 8px;
            font-size: 0.95rem;
            font-family: 'Fira Sans', sans-serif;
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 8px;
            outline: none;
            transition: all 0.2s;
        }

        .input-group input:focus {
            border-color: var(--primary);
            background: rgba(66, 133, 244, 0.05);
            box-shadow: 0 0 0 3px rgba(66, 133, 244, 0.15);
        }

        .input-group label {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 0.92rem;
            pointer-events: none;
            transition: all 0.2s ease;
        }

        .input-group input:focus~label,
        .input-group input:not(:placeholder-shown)~label {
            top: 10px;
            transform: translateY(0);
            font-size: 0.72rem;
            color: var(--primary);
            letter-spacing: 0.02em;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            font-family: 'Fira Sans', sans-serif;
            font-weight: 600;
            color: #fff;
            background: var(--primary);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(127, 90, 240, 0.45);
        }

        .btn-primary:active {
            transform: translateY(0) scale(0.98);
        }

        .btn-primary::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.15), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .btn-primary:hover::after {
            opacity: 1;
        }

        .error-msg {
            background: rgba(234, 67, 53, 0.1);
            border: 1px solid rgba(234, 67, 53, 0.3);
            color: var(--danger);
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            animation: fadeShake 0.4s ease;
        }

        @keyframes fadeShake {
            0% {
                opacity: 0;
                transform: translateX(-4px);
            }

            30% {
                transform: translateX(3px);
            }

            60% {
                transform: translateX(-2px);
            }

            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .footer-link {
            text-align: center;
            margin-top: 28px;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .footer-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .footer-link a:hover {
            color: var(--primary-dark);
        }

        @media (max-width: 480px) {
            .auth-card {
                margin: 16px;
                padding: 36px 24px;
            }
        }
    </style>
</head>

<body>

    <div class="auth-card">
        <div class="logo">
            <div class="icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="3 11 22 2 13 21 11 13 3 11" />
                </svg>
            </div>
        </div>
        <h1>Welcome Back</h1>
        <p class="subtitle">Sign in to Tracker Dashboard</p>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="POST" action="{% url 'login' %}" autocomplete="off">
            {% csrf_token %}

            <div class="input-group">
                <input type="text" id="username" name="username" placeholder=" " required autofocus>
                <label for="username">Username</label>
            </div>

            <div class="input-group">
                <input type="password" id="password" name="password" placeholder=" " required>
                <label for="password">Password</label>
            </div>

            <button type="submit" class="btn-primary">Sign In</button>
        </form>

        <div class="footer-link">
            Don't have an account? <a href="{% url 'register' %}">Register</a>
        </div>
    </div>

</body>

</html>
