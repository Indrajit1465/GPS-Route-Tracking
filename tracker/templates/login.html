<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Live Route Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            background-size: 400% 400%;
            animation: gradientShift 12s ease infinite;
            overflow: hidden;
        }

        @keyframes gradientShift {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Floating orbs */
        body::before, body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.35;
            z-index: 0;
            pointer-events: none;
        }
        body::before {
            width: 420px; height: 420px;
            background: radial-gradient(circle, #7f5af0, transparent 70%);
            top: -80px; left: -100px;
            animation: floatOrb1 8s ease-in-out infinite alternate;
        }
        body::after {
            width: 350px; height: 350px;
            background: radial-gradient(circle, #2cb67d, transparent 70%);
            bottom: -60px; right: -80px;
            animation: floatOrb2 10s ease-in-out infinite alternate;
        }
        @keyframes floatOrb1 {
            0%   { transform: translate(0, 0) scale(1); }
            100% { transform: translate(60px, 80px) scale(1.15); }
        }
        @keyframes floatOrb2 {
            0%   { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-50px, -70px) scale(1.1); }
        }

        .auth-card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 48px 40px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            animation: cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        @keyframes cardIn {
            0% { opacity: 0; transform: translateY(30px) scale(0.96); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .auth-card .logo {
            text-align: center;
            margin-bottom: 8px;
        }
        .auth-card .logo .icon {
            width: 56px; height: 56px;
            background: linear-gradient(135deg, #7f5af0, #2cb67d);
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: #fff;
            margin-bottom: 12px;
            box-shadow: 0 4px 20px rgba(127, 90, 240, 0.3);
        }

        .auth-card h1 {
            text-align: center;
            color: #fffffe;
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .auth-card .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.88rem;
            margin-bottom: 32px;
        }

        /* Floating-label input group */
        .input-group {
            position: relative;
            margin-bottom: 24px;
        }
        .input-group input {
            width: 100%;
            padding: 16px 16px 8px;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            color: #fffffe;
            background: rgba(255, 255, 255, 0.07);
            border: 1.5px solid rgba(255, 255, 255, 0.12);
            border-radius: 14px;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s, background 0.3s;
        }
        .input-group input:focus {
            border-color: #7f5af0;
            box-shadow: 0 0 0 3px rgba(127, 90, 240, 0.2);
            background: rgba(255, 255, 255, 0.1);
        }
        .input-group label {
            position: absolute;
            left: 16px; top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.92rem;
            pointer-events: none;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .input-group input:focus ~ label,
        .input-group input:not(:placeholder-shown) ~ label {
            top: 10px;
            transform: translateY(0);
            font-size: 0.7rem;
            color: #7f5af0;
            letter-spacing: 0.04em;
        }

        .btn-primary {
            width: 100%;
            padding: 15px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            color: #fff;
            background: linear-gradient(135deg, #7f5af0, #2cb67d);
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.3s;
            box-shadow: 0 4px 20px rgba(127, 90, 240, 0.3);
            position: relative;
            overflow: hidden;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(127, 90, 240, 0.45);
        }
        .btn-primary:active {
            transform: translateY(0) scale(0.98);
        }
        .btn-primary::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .btn-primary:hover::after { opacity: 1; }

        .error-msg {
            background: rgba(255, 73, 73, 0.12);
            border: 1px solid rgba(255, 73, 73, 0.3);
            color: #ff6b6b;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            animation: fadeShake 0.4s ease;
        }
        @keyframes fadeShake {
            0%   { opacity: 0; transform: translateX(-8px); }
            30%  { transform: translateX(6px); }
            60%  { transform: translateX(-4px); }
            100% { opacity: 1; transform: translateX(0); }
        }

        .footer-link {
            text-align: center;
            margin-top: 28px;
            color: rgba(255, 255, 255, 0.45);
            font-size: 0.85rem;
        }
        .footer-link a {
            color: #7f5af0;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }
        .footer-link a:hover {
            color: #2cb67d;
        }

        @media (max-width: 480px) {
            .auth-card { margin: 16px; padding: 36px 24px; }
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="logo">
            <div class="icon">📍</div>
        </div>
        <h1>Welcome Back</h1>
        <p class="subtitle">Sign in to Live Route Tracker</p>

        {% if error %}
            <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="POST" autocomplete="off">
            {% csrf_token %}

            <div class="input-group">
                <input type="text" id="username" name="username" placeholder=" " required autofocus>
                <label for="username">Username</label>
            </div>

            <div class="input-group">
                <input type="password" id="password" name="password" placeholder=" " required>
                <label for="password">Password</label>
            </div>

            <button type="submit" class="btn-primary">Sign In</button>
        </form>

        <div class="footer-link">
            Don't have an account? <a href="{% url 'register' %}">Register</a>
        </div>
    </div>

</body>
</html>
