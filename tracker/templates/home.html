<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Fira+Sans:wght@400;600;700&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --primary: #4285F4;
            --primary-dark: #2b6fd4;
            --danger: #EA4335;
            --danger-dark: #c62828;
            --success: #34A853;
            --warning: #FBBC05;
            --bg-dark: #0f1117;
            --bg-card: #1a1d27;
            --bg-card-hover: #21253a;
            --border: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: #9aa0b4;
            --radius: 12px;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
            --font-data: 'Fira Code', 'Courier New', monospace;
            --font-body: 'Fira Sans', 'Segoe UI', Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg-dark);
            color: var(--text-primary);
            font-family: var(--font-body);
            min-height: 100vh;
        }

        /* ── Navbar ── */
        .navbar {
            background: rgba(15, 17, 23, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            font-family: var(--font-body);
        }

        .navbar-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-badge {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 13px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-logout {
            background: transparent;
            border: 1px solid var(--danger);
            color: var(--danger);
            border-radius: 8px;
            padding: 6px 16px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-logout:hover {
            background: var(--danger);
            color: white;
        }

        /* ── Layout ── */
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px 20px;
        }

        .page-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 20px;
            letter-spacing: -0.3px;
        }

        /* ── Stats Bar ── */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px 16px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-family: var(--font-body);
        }

        .stat-value {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            font-family: var(--font-data);
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }

        .status-dot.idle {
            background: var(--text-secondary);
        }

        .status-dot.live {
            background: var(--success);
            box-shadow: 0 0 8px var(--success);
            animation: pulse 1.2s infinite;
        }

        @media (prefers-reduced-motion: reduce) {
            .status-dot.live {
                animation: none;
            }
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }
        }

        /* ── Buttons ── */
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 11px 22px;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: var(--font-body);
        }

        .btn-start {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 16px rgba(66, 133, 244, 0.35);
        }

        .btn-start:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(66, 133, 244, 0.45);
        }

        .btn-stop {
            background: var(--danger);
            color: white;
            box-shadow: 0 4px 16px rgba(234, 67, 53, 0.35);
        }

        .btn-stop:hover {
            background: var(--danger-dark);
            transform: translateY(-1px);
        }

        .btn-outline {
            background: transparent;
            color: var(--primary);
            border: 1.5px solid var(--primary);
        }

        .btn-outline:hover {
            background: rgba(66, 133, 244, 0.1);
        }

        /* ── Map ── */
        .map-wrapper {
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            margin-bottom: 16px;
        }

        #map {
            width: 100%;
            height: 65vh;
        }

        /* ── Instructions Card ── */
        .instructions-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-top: 16px;
        }

        .instructions-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .instructions-body {
            min-height: 80px;
            color: var(--text-secondary);
            font-size: 13px;
            line-height: 1.6;
        }

        /* ── Route Summary Card ── */
        .route-summary-card {
            background: var(--bg-card);
            border: 1px solid var(--primary);
            border-radius: var(--radius);
            padding: 16px 20px;
            margin-top: 16px;
            box-shadow: 0 0 20px rgba(66, 133, 244, 0.15);
        }

        .summary-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .summary-title {
            font-size: 14px;
            font-weight: 700;
        }

        .btn-clear-route {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            border-radius: 6px;
            padding: 4px 10px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-clear-route:hover {
            border-color: var(--danger);
            color: var(--danger);
        }

        .summary-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 14px;
        }

        .summary-stat {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .summary-label {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }

        .summary-value {
            font-size: 16px;
            font-weight: 700;
            font-family: var(--font-data);
        }

        .summary-legend {
            display: flex;
            gap: 20px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 2px solid white;
        }

        .legend-dot.red {
            background: var(--danger);
        }

        .legend-dot.blue {
            background: var(--primary);
        }

        /* ── History Cards ── */
        .history-route-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
        }

        .history-route-card:hover {
            border-color: var(--primary);
            background: var(--bg-card-hover);
        }

        .history-route-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .history-route-stats {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .history-stat {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .history-stat span {
            color: var(--text-primary);
            font-weight: 600;
            font-family: var(--font-data);
        }

        .btn-view-route {
            margin-top: 12px;
            width: 100%;
            padding: 8px;
            background: rgba(66, 133, 244, 0.1);
            border: 1px solid var(--primary);
            color: var(--primary);
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-view-route:hover {
            background: var(--primary);
            color: white;
        }

        .load-more-btn {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1.5px solid var(--border);
            color: var(--text-secondary);
            border-radius: var(--radius);
            font-size: 14px;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.2s;
        }

        .load-more-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* ── Responsive Breakpoints ── */
        @media (max-width: 767px) {
            .controls {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }

            .stats-bar {
                grid-template-columns: repeat(2, 1fr);
            }

            .summary-stats {
                grid-template-columns: repeat(2, 1fr);
            }

            .main-container {
                padding: 12px;
            }

            #map {
                height: 65vh;
            }
        }

        @media (min-width: 768px) and (max-width: 1199px) {
            #map {
                height: 70vh;
            }
        }

        @media (min-width: 1200px) {
            #map {
                height: 78vh;
            }
        }
    </style>

    <script>
        // ═══════════════════════════════════════════
        // MOTION FILTER — Kalman-style GPS smoother
        // Adapts trust level based on GPS accuracy
        // ═══════════════════════════════════════════
        class MotionFilter {
            constructor() {
                this.lat = null;
                this.lon = null;
                this.vLat = 0;
                this.vLon = 0;
                this.posGain = 0.45;
                this.velGain = 0.15;
                this.damping = 0.80;
            }

            reset() {
                this.lat = null;
                this.lon = null;
                this.vLat = 0;
                this.vLon = 0;
            }

            update(lat, lon, acc) {
                // First point — initialize directly
                if (this.lat === null) {
                    this.lat = lat;
                    this.lon = lon;
                    return [lat, lon];
                }

                // Adapt trust level based on GPS accuracy
                // Low accuracy number = high quality GPS signal
                if (acc < 6) this.posGain = 0.6;   // Excellent GPS
                else if (acc < 12) this.posGain = 0.4;   // Good GPS
                else this.posGain = 0.15;  // Poor GPS — distrust

                // Prediction step
                let pLat = this.lat + this.vLat;
                let pLon = this.lon + this.vLon;

                // Residual (difference from prediction)
                let rLat = lat - pLat;
                let rLon = lon - pLon;

                // Correction step
                this.lat += this.posGain * rLat;
                this.lon += this.posGain * rLon;

                // Velocity update
                this.vLat += this.velGain * rLat;
                this.vLon += this.velGain * rLon;

                // Velocity damping — prevents runaway drift
                this.vLat *= this.damping;
                this.vLon *= this.damping;

                return [this.lat, this.lon];
            }
        }

        // Create single global instance
        const motionFilter = new MotionFilter();

        // ══════════════════════════════════════════════
        // PART 1 — Global Variable Declarations
        // ══════════════════════════════════════════════
        let map;
        let livePolyline = null;
        let snappedPolyline = null;
        let routePolyline = null;
        let startMarker = null;
        let endMarker = null;
        let movingMarker = null;
        let routePoints = [];
        let smoothedBuffer = [];
        let snapBatchBuffer = [];
        let totalDistanceMeters = 0;
        let lastPoint = null;
        let isTracking = false;
        let watchId = null;
        let trackingStartTime = null;
        let durationInterval = null;
        let _activeAnimation = null;
        let historyPage = 1;

        let anchorPoints    = [];  // Road-snapped anchors
        let lastAnchor      = null;
        let roadPathBuffer  = [];  // Accumulated road geometry
        const ANCHOR_DIST_M = 25;  // Get road path every 25m

        // ══════════════════════════════════════════════
        // PART 2 — Utility / Helper Functions
        // ══════════════════════════════════════════════

        // Django official CSRF cookie reader
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(
                            cookie.substring(name.length + 1)
                        );
                        break;
                    }
                }
            }
            return cookieValue;
        }

        // Validates CSRF token before use
        function getValidCsrfToken() {
            const token = getCookie('csrftoken');
            if (!token || token.length < 20) {
                console.error('CSRF token invalid or missing');
                return null;
            }
            return token;
        }

        // Redirect to login on 401
        function handleResponseAuth(res) {
            if (res.status === 401) {
                window.location.href = '/login/';
                return false;
            }
            return true;
        }

        function updateDistanceDisplay() {
            const el = document.getElementById('distance-display');
            if (!el) return;
            el.textContent = totalDistanceMeters < 1000
                ? Math.round(totalDistanceMeters) + ' m'
                : (totalDistanceMeters / 1000).toFixed(2) + ' km';
        }

        function updatePointsCount(count) {
            const el = document.getElementById('points-count');
            if (el) el.textContent = count;
        }

        function setTrackingStatus(active) {
            const el = document.getElementById('tracking-status');
            if (!el) return;
            el.innerHTML = active
                ? '<span class="status-dot live"></span>Live'
                : '<span class="status-dot idle"></span>Idle';
        }

        function startDurationTimer() {
            trackingStartTime = Date.now();
            durationInterval = setInterval(() => {
                const elapsed = Math.floor(
                    (Date.now() - trackingStartTime) / 1000
                );
                const mins = String(
                    Math.floor(elapsed / 60)).padStart(2, '0');
                const secs = String(elapsed % 60).padStart(2, '0');
                const el = document.getElementById('trip-duration');
                if (el) el.textContent = mins + ':' + secs;
            }, 1000);
        }

        function stopDurationTimer() {
            if (durationInterval) {
                clearInterval(durationInterval);
                durationInterval = null;
            }
        }

        function resetStats() {
            totalDistanceMeters = 0;
            lastPoint = null;
            smoothedBuffer = [];
            snapBatchBuffer = [];
            updateDistanceDisplay();
            updatePointsCount(0);
            setTrackingStatus(false);
            stopDurationTimer();
            const el = document.getElementById('trip-duration');
            if (el) el.textContent = '00:00';
        }

        function formatDistance(meters) {
            if (meters < 1000) return Math.round(meters) + ' m';
            return (meters / 1000).toFixed(2) + ' km';
        }

        function formatDuration(seconds) {
            if (seconds < 60) return seconds + ' sec';
            if (seconds < 3600) {
                return Math.floor(seconds / 60) + ' min '
                    + (seconds % 60) + ' sec';
            }
            return Math.floor(seconds / 3600) + ' hr '
                + Math.floor((seconds % 3600) / 60) + ' min';
        }

        // ══════════════════════════════════════════════
        // PART 3 — Marker Helper (AdvancedMarkerElement)
        // ══════════════════════════════════════════════

        function placeMarker(lat, lon, color, title, scale) {
            const parsedLat = parseFloat(lat);
            const parsedLon = parseFloat(lon);
            if (isNaN(parsedLat) || isNaN(parsedLon)) {
                console.error('placeMarker: invalid coords', lat, lon);
                return null;
            }
            const pin = new google.maps.marker.PinElement({
                background: color,
                borderColor: '#ffffff',
                glyphColor: '#ffffff',
                scale: scale || 1.2
            });
            return new google.maps.marker.AdvancedMarkerElement({
                position: { lat: parsedLat, lng: parsedLon },
                map: map,
                title: title,
                content: pin
            });
        }

        function removeMarker(marker) {
            if (marker) marker.map = null;
            return null;
        }

        function createNavigationMarker(lat, lon) {
            // Custom navigation arrow SVG — points upward at 0deg
            const arrowSvg = `
              <svg xmlns="http://www.w3.org/2000/svg"
                   width="40" height="40" viewBox="0 0 40 40">
                <circle cx="20" cy="20" r="18"
                        fill="#4285F4" fill-opacity="0.2"
                        stroke="#4285F4" stroke-width="1.5"/>
                <circle cx="20" cy="20" r="8"
                        fill="#4285F4" stroke="white"
                        stroke-width="2.5"/>
                <polygon points="20,4 26,18 20,14 14,18"
                         fill="white"/>
              </svg>`;

            const div = document.createElement('div');
            div.id = 'nav-marker';
            div.style.cssText = `
              width: 40px;
              height: 40px;
              transform-origin: center;
              transform: rotate(0deg);
              transition: transform 0.3s ease;
              cursor: default;
            `;
            div.innerHTML = arrowSvg;

            return new google.maps.marker.AdvancedMarkerElement({
                position: { lat: parseFloat(lat), lng: parseFloat(lon) },
                map: map,
                title: 'Current Position',
                content: div
            });
        }

        function updateMarkerHeading(fromPoint, toPoint) {
            if (!movingMarker || !fromPoint || !toPoint) return;

            const heading = google.maps.geometry.spherical
                .computeHeading(
                    new google.maps.LatLng(
                        parseFloat(fromPoint.lat),
                        parseFloat(fromPoint.lon)
                    ),
                    new google.maps.LatLng(
                        parseFloat(toPoint.lat),
                        parseFloat(toPoint.lon)
                    )
                );

            const markerDiv = document.getElementById('nav-marker');
            if (markerDiv) {
                markerDiv.style.transform = `rotate(${heading}deg)`;
            }
        }

        // ══════════════════════════════════════════════
        // PART 4 — Google Maps Initialization
        // ══════════════════════════════════════════════

        function initGoogleMap() {
            map = new google.maps.Map(
                document.getElementById('map'), {
                center: { lat: 16.7050, lng: 74.2433 },
                zoom: 15,
                mapTypeId: 'roadmap',
                mapId: 'GPS_ROUTE_TRACKER_MAP',
                zoomControl: true,
                mapTypeControl: false,
                scaleControl: true,
                streetViewControl: false,
                rotateControl: false,
                fullscreenControl: true
            }
            );
        }

        // CRITICAL — must be assigned before Google Maps loads
        window.initMap = initGoogleMap;

        // ══════════════════════════════════════════════
        // PART 5 — GPS Pipeline Functions
        // ══════════════════════════════════════════════

        // Adaptive sampling interval based on speed
        function getSamplingInterval(speedMs) {
            if (speedMs === null || speedMs === undefined) return 2000;
            if (speedMs < 0.5) return 8000; // stationary
            if (speedMs < 3.0) return 2000; // walking
            return 1000;                      // driving
        }

        // Confidence check — rejects physically impossible jumps
        function calculateConfidence(point, last) {
            if (!last) return true;
            const R = 6371000;
            const dLat = (point.lat - last.lat) * Math.PI / 180;
            const dLon = (point.lon - last.lon) * Math.PI / 180;
            const a = Math.sin(dLat / 2) ** 2 +
                Math.cos(last.lat * Math.PI / 180) *
                Math.cos(point.lat * Math.PI / 180) *
                Math.sin(dLon / 2) ** 2;
            const dist = R * 2 * Math.atan2(
                Math.sqrt(a), Math.sqrt(1 - a)
            );
            // Reject if distance implies > 200km/h speed
            return dist < 55;
        }

        // Moving average over last 3 points
        function movingAverage(buffer, newPoint) {
            const win = [...buffer.slice(-2), newPoint];
            return {
                lat: parseFloat((win.reduce((s, p) => s + p.lat, 0) / win.length).toFixed(7)),
                lon: parseFloat((win.reduce((s, p) => s + p.lon, 0) / win.length).toFixed(7))
            };
        }

        // Snap single point to road via backend
        async function snapPoint(point) {
            return { lat: parseFloat(point.lat), lon: parseFloat(point.lon) };
        }

        function haversineJS(lat1, lon1, lat2, lon2) {
            const R    = 6371000;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a    = Math.sin(dLat/2)**2 +
                         Math.cos(lat1 * Math.PI/180) *
                         Math.cos(lat2 * Math.PI/180) *
                         Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        // Process batch of points through snap endpoint
        async function processSnapBatch(batch) {
            if (batch.length === 0) return [];
            try {
                const csrf = getValidCsrfToken();
                if (!csrf) return batch;
                const res = await fetch('/snap_chunk/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': csrf
                    },
                    body: JSON.stringify({ points: batch })
                });
                if (!handleResponseAuth(res)) return batch;
                if (res.ok) {
                    const data = await res.json();
                    if (data.snapped && data.snapped.length > 0) {
                        return data.snapped.map(p => ({
                            lat: parseFloat(p.lat ?? p[0]),
                            lon: parseFloat(p.lon ?? p.lng ?? p[1])
                        }));
                    }
                }
            } catch (e) { console.error('processSnapBatch error:', e); }
            return batch;
        }

        // ══════════════════════════════════════════════
        // PART 6 — Smooth Marker Animation
        // ══════════════════════════════════════════════

        function smoothMoveMarker(marker, sLat, sLng, eLat, eLng, dur) {
            // Cancel any in-progress animation first
            if (_activeAnimation) {
                cancelAnimationFrame(_activeAnimation);
                _activeAnimation = null;
            }
            const start = performance.now();
            function step(now) {
                const t = Math.min((now - start) / dur, 1);
                marker.position = {
                    lat: sLat + (eLat - sLat) * t,
                    lng: sLng + (eLng - sLng) * t
                };
                if (t < 1) {
                    _activeAnimation = requestAnimationFrame(step);
                } else {
                    _activeAnimation = null;
                }
            }
            _activeAnimation = requestAnimationFrame(step);
        }

        // ══════════════════════════════════════════════
        // PART 7 — GPS Success / Error Callbacks
        // ══════════════════════════════════════════════

        async function onGPSSuccess(position) {
            if (!isTracking) return;

            const rawLat = parseFloat(position.coords.latitude);
            const rawLon = parseFloat(position.coords.longitude);
            const acc    = position.coords.accuracy || 20;

            if (isNaN(rawLat) || isNaN(rawLon)) return;

            // Apply motion filter for smooth movement
            const [filtLat, filtLon] = motionFilter.update(
                rawLat, rawLon, acc
            );

            // Confidence check — reject impossible jumps
            if (!calculateConfidence(
                { lat: filtLat, lon: filtLon }, lastPoint
            )) return;

            // Distance filter — ignore micro movements < 3m
            if (lastPoint) {
                const dist = haversineJS(
                    lastPoint.lat, lastPoint.lon, filtLat, filtLon
                );
                if (dist < 3) return;
            }

            const currentPoint = { lat: filtLat, lon: filtLon };

            // ── LAYER 1: Draw live point IMMEDIATELY ──────
            // Zero lag — user sees movement right away
            if (livePolyline) {
                livePolyline.getPath().push(
                    new google.maps.LatLng(filtLat, filtLon)
                );
            }

            // Place start marker on very first point
            if (!startMarker && !lastPoint) {
                startMarker = placeMarker(
                    filtLat, filtLon, '#34A853', 'Start', 1.2
                );
            }

            // Update moving navigation marker immediately
            if (!movingMarker) {
                movingMarker = createNavigationMarker(
                    filtLat, filtLon
                );
            } else if (lastPoint) {
                updateMarkerHeading(lastPoint, currentPoint);
                smoothMoveMarker(
                    movingMarker,
                    parseFloat(lastPoint.lat),
                    parseFloat(lastPoint.lon),
                    filtLat, filtLon, 800
                );
            }

            // Update distance using raw movement
            if (lastPoint) {
                const seg = haversineJS(
                    lastPoint.lat, lastPoint.lon,
                    filtLat, filtLon
                );
                if (!isNaN(seg) && isFinite(seg) && seg < 200) {
                    totalDistanceMeters += seg;
                    updateDistanceDisplay();
                }
            }

            lastPoint = currentPoint;
            updatePointsCount(routePoints.length);
            map.panTo({ lat: filtLat, lng: filtLon });

            // ── LAYER 2: Road path every 25 meters ────────
            // Non-blocking — fires in background
            // Does NOT cause any visible lag
            if (!lastAnchor) {
                lastAnchor = currentPoint;
                anchorPoints.push(currentPoint);
                routePoints.push(currentPoint);
                return;
            }

            const distFromAnchor = haversineJS(
                lastAnchor.lat, lastAnchor.lon,
                filtLat, filtLon
            );

            if (distFromAnchor >= ANCHOR_DIST_M) {
                const origin      = { ...lastAnchor };
                const destination = { ...currentPoint };
                lastAnchor        = currentPoint;
                anchorPoints.push(currentPoint);

                // Fire road path request in background
                // Using async IIFE so it never blocks GPS callback
                ;(async () => {
                    try {
                        const csrf = getValidCsrfToken();
                        if (!csrf) return;

                        const res = await fetch('/get_road_path/', {
                            method: 'POST',
                            headers: {
                                'Content-Type':  'application/json',
                                'X-CSRFToken':   csrf
                            },
                            body: JSON.stringify({ origin, destination })
                        });

                        if (!handleResponseAuth(res)) return;
                        if (!res.ok) return;

                        const data = await res.json();
                        const roadPoints = data.path || [];

                        if (roadPoints.length < 2) return;

                        // Add road geometry points to routePoints
                        roadPoints.forEach(p => {
                            const rLat = parseFloat(p.lat);
                            const rLon = parseFloat(p.lon);
                            if (!isNaN(rLat) && !isNaN(rLon)) {
                                routePoints.push({ lat: rLat, lon: rLon });
                            }
                        });

                        // Redraw snapped polyline with road geometry
                        // This replaces straight lines with real roads
                        if (snappedPolyline && routePoints.length > 1) {
                            snappedPolyline.setPath(
                                routePoints.map(p => ({
                                    lat: parseFloat(p.lat),
                                    lng: parseFloat(p.lon)
                                }))
                            );
                        }

                    } catch(e) {
                        // Silent fail — live tracking continues unaffected
                        console.warn('Road path fetch failed:', e.message);
                    }
                })();
            }
        }

        function onGPSError(error) {
            console.error('GPS Error:', error.code, error.message);
        }

        // ══════════════════════════════════════════════
        // PART 8 — Start / Stop Tracking
        // ══════════════════════════════════════════════

        function startTracking() {
            // Reset all state
            routePoints      = [];
            anchorPoints     = [];
            roadPathBuffer   = [];
            lastAnchor       = null;
            motionFilter.reset();
            resetStats();

            // Remove existing layers
            if (livePolyline)    { livePolyline.setMap(null);    livePolyline    = null; }
            if (snappedPolyline) { snappedPolyline.setMap(null); snappedPolyline = null; }
            if (routePolyline)   { routePolyline.setMap(null);   routePolyline   = null; }
            startMarker  = removeMarker(startMarker);
            endMarker    = removeMarker(endMarker);
            movingMarker = removeMarker(movingMarker);

            const card = document.getElementById('route-summary');
            if (card) card.remove();

            // LAYER 1 — Visible live tracking line
            // Shows immediately as user moves
            livePolyline = new google.maps.Polyline({
                path:          [],
                geodesic:      true,
                strokeColor:   '#4285F4',
                strokeOpacity: 0.35,  // Faint — shows raw GPS
                strokeWeight:  4,
                map:           map
            });

            // LAYER 2 — Road-accurate snapped line
            // Updates in background as road paths return
            snappedPolyline = new google.maps.Polyline({
                path:          [],
                geodesic:      true,
                strokeColor:   '#1a73e8',  // Slightly darker blue
                strokeOpacity: 1.0,        // Solid — this is the true route
                strokeWeight:  6,
                map:           map,
                zIndex:        10          // Renders on top of live line
            });

            setTrackingStatus(true);
            startDurationTimer();
            isTracking = true;

            if (!navigator.geolocation) {
                alert('Geolocation not supported.');
                return;
            }

            watchId = navigator.geolocation.watchPosition(
                onGPSSuccess, onGPSError,
                {
                    enableHighAccuracy: true,
                    timeout:            10000,
                    maximumAge:         0
                }
            );
        }

        async function stopTracking() {
            if (!isTracking) return;
            isTracking = false;
            setTrackingStatus(false);
            stopDurationTimer();

            if (watchId !== null) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
            }

            movingMarker = removeMarker(movingMarker);

            // Wait briefly for any in-flight road path
            // requests to complete before saving
            await new Promise(resolve => setTimeout(resolve, 1500));

            if (routePoints.length === 0) {
                alert('No route points recorded.');
                return;
            }

            // Place end marker at last known position
            if (lastPoint) {
                const endLat = parseFloat(lastPoint.lat);
                const endLon = parseFloat(lastPoint.lon);
                if (!isNaN(endLat) && !isNaN(endLon)) {
                    endMarker = placeMarker(
                        endLat, endLon, '#EA4335', 'End Point', 1.2
                    );
                }
            }

            // Save road-snapped route to backend
            const csrf = getValidCsrfToken();
            if (!csrf) {
                alert('Security token missing. Please refresh.');
                return;
            }

            try {
                const res = await fetch('/save_route/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken':  csrf
                    },
                    body: JSON.stringify({ points: routePoints })
                });
                if (!handleResponseAuth(res)) return;
                if (res.ok) {
                    console.log('Route saved successfully');
                } else {
                    const err = await res.json();
                    alert('Save failed: ' + (err.message || err.error));
                }
            } catch(e) {
                console.error('Save error:', e);
            }
        }

        // ══════════════════════════════════════════════
        // PART 9 — Route History
        // ══════════════════════════════════════════════

        async function viewHistory(page = 1) {
            try {
                const res = await fetch(
                    `/route_history/?page=${page}&limit=10`,
                    { method: 'GET', headers: { 'Content-Type': 'application/json' } }
                );
                if (!handleResponseAuth(res)) return;
                if (!res.ok) return;

                const data = await res.json();
                const list = document.getElementById('history-list');

                if (page === 1) list.innerHTML = '';

                if (data.routes.length === 0 && page === 1) {
                    list.innerHTML = '<p style="color:var(--text-secondary);text-align:center;padding:20px;">No routes saved yet.</p>';
                }

                data.routes.forEach(route => {
                    const card = document.createElement('div');
                    card.className = 'history-route-card';
                    card.innerHTML = `
          <div class="history-route-title">
            Route — ${route.created_at}
          </div>
          <div class="history-route-stats">
            <div class="history-stat">
              Distance: <span>${formatDistance(route.distance_meters)}</span>
            </div>
            <div class="history-stat">
              Duration: <span>${formatDuration(route.duration_seconds)}</span>
            </div>
            <div class="history-stat">
              Points: <span>${route.total_points}</span>
            </div>
          </div>
          <button class="btn-view-route"
            onclick="loadHistoryRoute(${JSON.stringify(route).replace(/"/g, '&quot;')})">
            View on Map
          </button>
        `;
                    list.appendChild(card);
                });

                // Load More button
                const existingLoadMore = document.getElementById('load-more-btn');
                if (existingLoadMore) existingLoadMore.remove();

                if (data.current_page < data.total_pages) {
                    const btn = document.createElement('button');
                    btn.id = 'load-more-btn';
                    btn.className = 'load-more-btn';
                    btn.textContent = 'Load More';
                    btn.onclick = () => viewHistory(data.current_page + 1);
                    list.appendChild(btn);
                }

                document.getElementById('history-modal').style.display = 'block';

            } catch (e) { console.error('History error:', e); }
        }

        function closeHistoryModal() {
            document.getElementById('history-modal').style.display = 'none';
        }

        function loadHistoryRoute(routeData) {
            if (livePolyline) { livePolyline.setMap(null); livePolyline = null; }
            if (snappedPolyline) { snappedPolyline.setMap(null); snappedPolyline = null; }
            if (routePolyline) { routePolyline.setMap(null); routePolyline = null; }
            startMarker = removeMarker(startMarker);
            endMarker = removeMarker(endMarker);

            const rawPoints = routeData.route_points;
            if (!rawPoints || rawPoints.length === 0) {
                console.error('No route points in history data');
                return;
            }

            // Normalize every point to {lat: float, lng: float}
            // for Google Maps — handles all possible formats
            const path = [];
            rawPoints.forEach((p, i) => {
                let lat, lon;
                try {
                    if (Array.isArray(p)) {
                        lat = parseFloat(p[0]);
                        lon = parseFloat(p[1]);
                    } else if (typeof p === 'object') {
                        lat = parseFloat(
                            p.lat ?? p.latitude ?? p[0] ?? 0
                        );
                        lon = parseFloat(
                            p.lon ?? p.lng ?? p.longitude ?? p[1] ?? 0
                        );
                    }
                    if (!isNaN(lat) && !isNaN(lon) &&
                        lat >= -90 && lat <= 90 &&
                        lon >= -180 && lon <= 180) {
                        path.push({ lat, lng: lon });
                    }
                } catch (e) {
                    console.warn(`Skipping invalid point at index ${i}:`, p);
                }
            });

            if (path.length < 2) {
                alert('Not enough valid points to display this route.');
                return;
            }

            // Draw historical polyline
            routePolyline = new google.maps.Polyline({
                path: path,
                geodesic: true,
                strokeColor: '#4285F4',
                strokeOpacity: 0.9,
                strokeWeight: 5,
                map: map
            });

            // RED start marker
            startMarker = placeMarker(
                path[0].lat, path[0].lng,
                '#EA4335', 'Start Point', 1.2
            );

            // BLUE end marker
            const last = path[path.length - 1];
            endMarker = placeMarker(
                last.lat, last.lng,
                '#4285F4', 'End Point', 1.2
            );

            // Safe fitBounds
            try {
                const bounds = new google.maps.LatLngBounds();
                path.forEach(p => bounds.extend(p));
                if (!bounds.isEmpty()) {
                    map.fitBounds(bounds, { padding: 60 });
                }
            } catch (e) {
                console.error('fitBounds error:', e);
                map.setCenter(path[0]);
                map.setZoom(15);
            }

            showRouteSummaryCard(routeData);
            closeHistoryModal();
        }

        function showRouteSummaryCard(routeData) {
            const existing = document.getElementById('route-summary');
            if (existing) existing.remove();

            const card = document.createElement('div');
            card.id = 'route-summary';
            card.className = 'route-summary-card';
            card.innerHTML = `
      <div class="summary-header">
        <span class="summary-title">Viewing Saved Route</span>
        <button class="btn-clear-route"
                onclick="clearHistoryRoute()">✕ Clear</button>
      </div>
      <div class="summary-stats">
        <div class="summary-stat">
          <span class="summary-label">Distance</span>
          <span class="summary-value">
            ${formatDistance(routeData.distance_meters)}
          </span>
        </div>
        <div class="summary-stat">
          <span class="summary-label">Duration</span>
          <span class="summary-value">
            ${formatDuration(routeData.duration_seconds)}
          </span>
        </div>
        <div class="summary-stat">
          <span class="summary-label">Points</span>
          <span class="summary-value">
            ${routeData.total_points}
          </span>
        </div>
        <div class="summary-stat">
          <span class="summary-label">Saved On</span>
          <span class="summary-value"
                style="font-size:13px;font-family:var(--font-body)">
            ${routeData.created_at}
          </span>
        </div>
      </div>
      <div class="summary-legend">
        <span class="legend-item">
          <span class="legend-dot red"></span>Start Point
        </span>
        <span class="legend-item">
          <span class="legend-dot blue"></span>End Point
        </span>
      </div>
    `;

            const mapWrapper = document.querySelector('.map-wrapper');
            mapWrapper.insertAdjacentElement('afterend', card);
        }

        function clearHistoryRoute() {
            if (routePolyline) { routePolyline.setMap(null); routePolyline = null; }
            startMarker = removeMarker(startMarker);
            endMarker = removeMarker(endMarker);
            const card = document.getElementById('route-summary');
            if (card) card.remove();
        }

        // ══════════════════════════════════════════════
        // PART 10 — Button Event Bindings
        // ══════════════════════════════════════════════

        document.addEventListener('DOMContentLoaded', () => {
            const startBtn = document.getElementById('start-btn');
            const stopBtn = document.getElementById('stop-btn');
            const historyBtn = document.getElementById('history-btn');

            if (startBtn) startBtn.addEventListener('click', startTracking);
            if (stopBtn) stopBtn.addEventListener('click', stopTracking);
            if (historyBtn) historyBtn.addEventListener(
                'click', () => viewHistory(1)
            );
        });
    </script>
    <script
        src="https://maps.googleapis.com/maps/api/js?key={{ GOOGLE_MAPS_API_KEY }}&loading=async&callback=initMap&libraries=geometry,marker"
        async defer>
        </script>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-brand">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#4285F4" stroke-width="2">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z" />
                <circle cx="12" cy="10" r="3" />
            </svg>
            Live Route Tracker
        </div>
        <div class="navbar-right">
            <div class="user-badge">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
                    <circle cx="12" cy="7" r="4" />
                </svg>
                {{ request.user.username }}
            </div>
            <a href="/logout/" class="btn-logout">Logout</a>
        </div>
    </nav>

    <!-- Hidden CSRF form — required for AJAX on AJAX-only pages -->
    <form style="display:none;">{% csrf_token %}</form>

    <div class="main-container">
        <h1 class="page-title">GPS Route Tracker</h1>

        <!-- Stats Bar -->
        <div class="stats-bar">
            <div class="stat-card">
                <span class="stat-label">Status</span>
                <span class="stat-value" id="tracking-status">
                    <span class="status-dot idle"></span>Idle
                </span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Distance</span>
                <span class="stat-value" id="distance-display">0 m</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Points</span>
                <span class="stat-value" id="points-count">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Duration</span>
                <span class="stat-value" id="trip-duration">00:00</span>
            </div>
        </div>

        <!-- Control Buttons -->
        <div class="controls">
            <button id="start-btn" class="btn btn-start">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                    <polygon points="5,3 19,12 5,21" />
                </svg>
                Start Tracking
            </button>
            <button id="stop-btn" class="btn btn-stop">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                    <rect x="3" y="3" width="18" height="18" rx="2" />
                </svg>
                Stop Tracking
            </button>
            <button id="history-btn" class="btn btn-outline">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10" />
                    <polyline points="12,6 12,12 16,14" />
                </svg>
                Route History
            </button>
            <button id="offline-btn" class="btn btn-outline">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="1" y1="1" x2="23" y2="23" />
                    <path d="M16.72 11.06A10.94 10.94 0 0119 12.55" />
                    <path d="M5 12.55a10.94 10.94 0 015.17-2.39" />
                </svg>
                Offline Routes
            </button>
        </div>

        <!-- Map -->
        <div class="map-wrapper">
            <div id="map"></div>
        </div>

        <!-- Route summary card injected here dynamically -->

        <!-- Turn by Turn Instructions -->
        <div class="instructions-card">
            <div class="instructions-title">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#4285F4" stroke-width="2"
                    style="margin-right:8px;vertical-align:middle">
                    <polygon points="3,11 22,2 13,21 11,13" />
                </svg>
                Turn-by-Turn Instructions
            </div>
            <div class="instructions-body" id="instructions-body">
                Start tracking to see route instructions.
            </div>
        </div>
    </div>

    <!-- History Modal -->
    <div id="history-modal" style="display:none; position:fixed;
       top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8);
       z-index:2000; overflow-y:auto; padding:20px;">
        <div style="max-width:700px; margin:40px auto; background:var(--bg-card);
                border-radius:16px; padding:24px; border:1px solid var(--border);">
            <div style="display:flex; justify-content:space-between;
                  align-items:center; margin-bottom:20px;">
                <h2 style="font-size:18px; font-weight:700;">Route History</h2>
                <button onclick="closeHistoryModal()" style="background:transparent; border:none;
                       color:var(--text-secondary); font-size:20px;
                       cursor:pointer;">✕</button>
            </div>
            <div id="history-list"></div>
        </div>
    </div>
</body>

</html>
