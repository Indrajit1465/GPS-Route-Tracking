<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Live Route Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4285F4;
            --primary-dark: #2b6fd4;
            --danger: #EA4335;
            --bg-dark: #0f1117;
            --bg-card: #1a1d27;
            --border: rgba(255,255,255,0.08);
            --text-primary: #ffffff;
            --text-secondary: #9aa0b4;
            --radius: 12px;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Fira Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-dark);
            color: var(--text-primary);
        }

        .auth-card {
            width: 100%;
            max-width: 440px;
            padding: 44px 40px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
            animation: cardIn 0.4s ease-out;
        }

        @keyframes cardIn {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .auth-card .logo {
            text-align: center;
            margin-bottom: 12px;
        }
        
        .auth-card .logo .icon {
            width: 56px; height: 56px;
            background: rgba(66, 133, 244, 0.1);
            border: 1px solid var(--primary);
            border-radius: var(--radius);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            margin-bottom: 16px;
        }

        .auth-card h1 {
            text-align: center;
            color: var(--text-primary);
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 6px;
        }
        
        .auth-card .subtitle {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 28px;
        }

        .input-group {
            position: relative;
            margin-bottom: 22px;
        }
        
        .input-group input {
            width: 100%;
            padding: 16px 16px 8px;
            font-size: 0.95rem;
            font-family: 'Fira Sans', sans-serif;
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 8px;
            outline: none;
            transition: all 0.2s;
        }
        
        .input-group input:focus {
            border-color: var(--primary);
            background: rgba(66, 133, 244, 0.05);
            box-shadow: 0 0 0 3px rgba(66, 133, 244, 0.15);
        }
        
        .input-group input.input-error {
            border-color: var(--danger);
            box-shadow: 0 0 0 3px rgba(234, 67, 53, 0.15);
        }
        
        .input-group label {
            position: absolute;
            left: 16px; top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 0.92rem;
            pointer-events: none;
            transition: all 0.2s ease;
        }
        
        .input-group input:focus ~ label,
        .input-group input:not(:placeholder-shown) ~ label {
            top: 10px;
            transform: translateY(0);
            font-size: 0.72rem;
            color: var(--primary);
            letter-spacing: 0.02em;
        }

        /* Password strength bar */
        .strength-bar {
            height: 4px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
            transition: opacity 0.3s;
        }
        .strength-bar .fill {
            height: 100%;
            width: 0%;
            border-radius: 2px;
            transition: width 0.4s ease, background 0.4s ease;
        }
        .strength-label {
            font-size: 0.72rem;
            color: rgba(255,255,255,0.4);
            margin-top: 4px;
            min-height: 16px;
            transition: color 0.3s;
        }

        .match-hint {
            font-size: 0.75rem;
            margin-top: 6px;
            min-height: 16px;
        }
        .match-hint.match { color: var(--primary); }
        .match-hint.no-match { color: var(--danger); }

        .btn-primary {
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            font-family: 'Fira Sans', sans-serif;
            font-weight: 600;
            color: #fff;
            background: var(--primary);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }
        
        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        .error-msg {
            background: rgba(234, 67, 53, 0.1);
            border: 1px solid rgba(234, 67, 53, 0.3);
            color: var(--danger);
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            animation: fadeShake 0.4s ease;
        }

        @keyframes fadeShake {
            0%   { opacity: 0; transform: translateX(-4px); }
            30%  { transform: translateX(3px); }
            60%  { transform: translateX(-2px); }
            100% { opacity: 1; transform: translateX(0); }
        }

        .footer-link {
            text-align: center;
            margin-top: 28px;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        
        .footer-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }
        
        .footer-link a:hover {
            color: var(--primary-dark);
        }

        @media (max-width: 480px) {
            .auth-card { margin: 16px; padding: 36px 24px; }
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="logo">
            <div class="icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="3 11 22 2 13 21 11 13 3 11" />
                </svg>
            </div>
        </div>
        <h1>Create Account</h1>
        <p class="subtitle">Join Tracker Dashboard</p>

        {% if error %}
            <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="POST" action="{% url 'register' %}" id="registerForm" autocomplete="off">
            {% csrf_token %}

            <div class="input-group">
                <input type="text" id="username" name="username" placeholder=" " required
                       value="{{ username|default:'' }}" autofocus>
                <label for="username">Username</label>
            </div>

            <div class="input-group">
                <input type="email" id="email" name="email" placeholder=" "
                       value="{{ email|default:'' }}">
                <label for="email">Email (optional)</label>
            </div>

            <div class="input-group">
                <input type="password" id="password1" name="password1" placeholder=" " required>
                <label for="password1">Password</label>
                <div class="strength-bar"><div class="fill" id="strengthFill"></div></div>
                <div class="strength-label" id="strengthLabel"></div>
            </div>

            <div class="input-group">
                <input type="password" id="password2" name="password2" placeholder=" " required>
                <label for="password2">Confirm Password</label>
                <div class="match-hint" id="matchHint"></div>
            </div>

            <button type="submit" class="btn-primary" id="submitBtn">Create Account</button>
        </form>

        <div class="footer-link">
            Already have an account? <a href="{% url 'login' %}">Sign In</a>
        </div>
    </div>

    <script>
    (function(){
        const pw1   = document.getElementById('password1');
        const pw2   = document.getElementById('password2');
        const fill  = document.getElementById('strengthFill');
        const label = document.getElementById('strengthLabel');
        const hint  = document.getElementById('matchHint');

        // ---- password strength ----
        pw1.addEventListener('input', function(){
            const v = pw1.value;
            let score = 0;
            if(v.length >= 4) score++;
            if(v.length >= 8) score++;
            if(/[A-Z]/.test(v) && /[a-z]/.test(v)) score++;
            if(/\d/.test(v)) score++;
            if(/[^A-Za-z0-9]/.test(v)) score++;

            const levels = [
                { w:'0%',  c:'transparent',label:'', color:'var(--text-secondary)' },
                { w:'20%', c:'var(--danger)',    label:'Very weak', color:'var(--danger)' },
                { w:'40%', c:'#ff9f43',    label:'Weak',      color:'#ff9f43' },
                { w:'60%', c:'#feca57',    label:'Fair',      color:'#feca57' },
                { w:'80%', c:'var(--primary)',    label:'Strong',    color:'var(--primary)' },
                { w:'100%',c:'var(--primary-dark)',    label:'Very strong',color:'var(--primary-dark)' }
            ];
            const l = levels[score];
            fill.style.width      = l.w;
            fill.style.background = l.c;
            label.textContent     = v ? l.label : '';
            label.style.color     = l.color;

            checkMatch();
        });

        // ---- password match ----
        pw2.addEventListener('input', checkMatch);

        function checkMatch(){
            const v1 = pw1.value, v2 = pw2.value;
            if(!v2){ hint.textContent=''; pw2.classList.remove('input-error'); return; }
            if(v1 === v2){
                hint.textContent = '✓ Passwords match';
                hint.className   = 'match-hint match';
                pw2.classList.remove('input-error');
            } else {
                hint.textContent = '✗ Passwords do not match';
                hint.className   = 'match-hint no-match';
                pw2.classList.add('input-error');
            }
        }
    })();
    </script>

</body>
</html>
